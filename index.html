<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облік приведеного настрілу</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@300;400;600&display=swap');
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2430;--border:#30363d;
  --accent:#c9a84c;--accent2:#e8c96a;--text:#e6edf3;--text2:#8b949e;
  --danger:#f85149;--success:#3fb950;
  --mono:'Share Tech Mono',monospace;--head:'Oswald',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}

header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--head);font-size:20px;font-weight:600;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.subtitle{font-size:11px;color:var(--text2);letter-spacing:1px;}
.hdate{font-size:13px;color:var(--accent2);letter-spacing:1px;}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;}
.tab{padding:10px 20px;cursor:pointer;font-family:var(--head);font-size:13px;letter-spacing:1px;color:var(--text2);border-bottom:3px solid transparent;transition:all .2s;text-transform:uppercase;}
.tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.main{padding:20px 24px;max-width:1400px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:4px;padding:20px;margin-bottom:16px;}
.card-title{font-family:var(--head);font-size:15px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;align-items:end;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
.fg select,.fg input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:var(--mono);font-size:13px;border-radius:3px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.fg select:focus,.fg input:focus{border-color:var(--accent);}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(70%) sepia(60%) saturate(400%) hue-rotate(5deg);cursor:pointer;opacity:0.85;}
input[type="date"]::-webkit-calendar-picker-indicator:hover{opacity:1;}
input[type="checkbox"]{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;cursor:pointer;
  background:var(--bg);
  border:2px solid var(--accent);
  border-radius:3px;
  position:relative;
  flex-shrink:0;
  transition:background .15s;
}
input[type="checkbox"]:checked{
  background:var(--accent);
}
input[type="checkbox"]:checked::after{
  content:'';
  position:absolute;
  left:4px;top:1px;
  width:8px;height:12px;
  border:2.5px solid #000;
  border-top:none;border-left:none;
  transform:rotate(45deg);
}
input[type="checkbox"]:hover{border-color:var(--accent2);}
.fbar input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(70%) sepia(60%) saturate(400%) hue-rotate(5deg);cursor:pointer;}
.fg select option{background:var(--surface2);}

.btn{padding:8px 18px;font-family:var(--head);font-size:13px;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--accent);color:#000;font-weight:600;}.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);font-size:11px;padding:4px 9px;border-radius:3px;cursor:pointer;}.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-success{background:var(--success);color:#000;font-weight:600;}.btn-success:hover{filter:brightness(1.1);}
.btn-icon{background:transparent;color:var(--accent);border:1px solid var(--accent);font-size:11px;padding:4px 9px;border-radius:3px;cursor:pointer;font-family:var(--head);letter-spacing:1px;transition:all .2s;}.btn-icon:hover{background:var(--accent);color:#000;}

.table-wrapper{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:var(--surface2);border-bottom:2px solid var(--accent);}
th{padding:10px 12px;text-align:left;font-family:var(--head);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);white-space:nowrap;}
td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;}
tr:hover td{background:rgba(201,168,76,.05);}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.hi{color:var(--accent2);font-weight:bold;}

.fbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.fbar select,.fbar input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:12px;border-radius:3px;outline:none;}
.fbar select:focus,.fbar input:focus{border-color:var(--accent);}
.fbar label{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px;border-radius:3px;}
.stat-label{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.stat-value{font-family:var(--head);font-size:22px;color:var(--accent);}

/* BATTERY SECTIONS in summary */
.bat-section{margin-bottom:24px;}
.bat-header{font-family:var(--head);font-size:14px;color:var(--bg);background:var(--accent);letter-spacing:3px;text-transform:uppercase;padding:6px 16px;border-radius:3px;margin-bottom:12px;display:inline-block;}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(500px,1fr));gap:12px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.sum-card-h{background:var(--surface2);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.sum-card-t{font-family:var(--head);font-size:14px;color:var(--accent);letter-spacing:1px;}
.sum-card-b{padding:10px 14px;}
.sum-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(48,54,61,.5);}
.sum-row:last-child{border-bottom:none;}
.sum-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.sum-table th{font-family:var(--head);font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid var(--accent);text-align:left;white-space:nowrap;}
.sum-table th.r{text-align:right;}
.sum-table td{padding:4px 6px;border-bottom:1px solid rgba(48,54,61,.4);color:var(--text);vertical-align:middle;}
.sum-table td.r{text-align:right;font-variant-numeric:tabular-nums;}
.sum-table td.acc{color:var(--accent2);text-align:right;font-variant-numeric:tabular-nums;}
.sum-table tr:hover td{background:rgba(201,168,76,.05);}
.sum-table .ring-cell{text-align:center;color:var(--success);}
.sum-total{margin-top:6px;padding-top:6px;border-top:1px solid var(--accent);}
.sum-total-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.sum-total-row.main{font-size:13px;color:var(--accent2);font-weight:bold;}

/* REFERENCE */
.ref-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
@media(max-width:800px){.ref-cols{grid-template-columns:1fr;}}
.ref-block{display:flex;flex-direction:column;gap:8px;}
.ref-block-title{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:2px;}

/* Cannon reference — grouped by battery */
.bat-group{margin-bottom:12px;}
.bat-group-label{font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-family:var(--head);}
.ref-list{display:flex;flex-wrap:wrap;gap:5px;min-height:24px;}
.ref-tag{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:3px 9px;font-size:12px;}
.ref-tag .x{background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;line-height:1;padding:0;}
.ref-empty{font-size:11px;color:var(--text2);font-style:italic;}
.ref-add{display:flex;gap:6px;align-items:center;margin-top:6px;}
.ref-add input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 9px;font-family:var(--mono);font-size:12px;border-radius:3px;outline:none;flex:1;min-width:0;}
.ref-add input:focus{border-color:var(--accent);}
.ref-add select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 9px;font-family:var(--mono);font-size:12px;border-radius:3px;outline:none;-webkit-appearance:none;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--accent);border-top:3px solid var(--accent);border-radius:6px;padding:24px;width:460px;max-width:95vw;}
.modal-title{font-family:var(--head);font-size:15px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.modal-grid .full{grid-column:1/-1;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}

#toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#000;padding:10px 20px;border-radius:4px;font-family:var(--head);font-size:13px;letter-spacing:1px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.err{background:var(--danger);color:#fff;}
.sum-tbl{table-layout:auto;width:100%;}
.sum-tbl th{font-family:var(--head);font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid var(--accent);text-align:left;white-space:nowrap;}
.sum-tbl th.r,.sum-tbl td.r{text-align:right;}
.sum-tbl td{padding:4px 6px;border-bottom:1px solid rgba(48,54,61,.4);color:var(--text);vertical-align:middle;white-space:nowrap;font-size:11px;}
.sum-tbl td.hi{color:var(--accent2);font-weight:bold;}
.sum-tbl tr:hover td{background:rgba(201,168,76,.05);}
.empty{text-align:center;color:var(--text2);font-size:13px;padding:36px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:750px){.two-col{grid-column:1fr;}}

/* optgroup styling hint */
select optgroup{background:var(--surface);color:var(--accent);font-style:normal;font-weight:600;}
select optgroup option{color:var(--text);background:var(--surface2);}

<div class="main">

<!-- ══ TAB: ВНЕСЕННЯ ══ -->
<div class="panel active" id="tab-input">
  <div class="two-col">

    <!-- ФОРМА -->
    <div style="display:flex;flex-direction:column;gap:12px;">

      <!-- Блок 1: Підрозділ -->
      <div class="card" style="margin-bottom:0">
        <div class="card-title" style="margin-bottom:10px;">🎯 Підрозділ</div>
        <div class="form-grid" style="grid-template-columns:1fr 1fr;">
          <div class="fg">
            <label>Батарея</label>
            <select id="inp-battery" onchange="onBatteryChange('inp')">
              <option value="">— оберіть —</option>
              <option value="7 абатр">7 абатр</option>
              <option value="8 абатр">8 абатр</option>
              <option value="9 абатр">9 абатр</option>
            </select>
          </div>
          <div class="fg">
            <label>Гармата</label>
            <select id="inp-cannon"><option value="">— спочатку батарея —</option></select>
          </div>
        </div>
        <div id="quick-stats" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
          <div style="font-family:var(--head);font-size:11px;color:var(--text2);letter-spacing:1px;margin-bottom:8px;">ПОТОЧНИЙ СТАН ГАРМАТИ</div>
          <div class="stats-grid" id="quick-cards" style="margin-bottom:0"></div>
        </div>
      </div>

      <!-- Блок 2: Постріл -->
      <div class="card" style="margin-bottom:0">
        <div class="card-title" style="margin-bottom:10px;">📥 Постріл</div>
        <div class="form-grid">
          <div class="fg">
            <label>Снаряд</label>
            <select id="inp-shell"><option value="">— оберіть —</option></select>
          </div>
          <div class="fg">
            <label>Заряд</label>
            <select id="inp-charge"><option value="">— оберіть —</option></select>
          </div>
          <div class="fg">
            <label>Зона заряду</label>
            <select id="inp-zone">
              <option value="">— оберіть —</option>
              <option value="3">Зона 3</option><option value="4">Зона 4</option>
              <option value="5">Зона 5</option><option value="6">Зона 6</option>
              <option value="7">Зона 7</option><option value="8">Зона 8</option>
              <option value="9">Зона 9</option><option value="10">Зона 10</option>
            </select>
          </div>
          <div class="fg">
            <label>Кількість пострілів</label>
            <input type="number" id="inp-count" min="1" placeholder="0">
          </div>
          <div class="fg">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding-top:4px;height:100%;align-self:center">
              <input type="checkbox" id="inp-ring" style="width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;border:2px solid var(--accent);">
              <span style="color:var(--accent2);font-size:12px;letter-spacing:1px;text-transform:uppercase;">Обтюраційне кільце</span>
            </label>
          </div>
          <div class="fg">
            <label>Дата</label>
            <input type="date" id="inp-date">
          </div>
          <div class="fg" style="grid-column:1/-1">
            <button class="btn btn-primary" onclick="addRecord()">+ Додати запис</button>
          </div>
        </div>
      </div>

    </div>

    <!-- ДОВІДНИК -->
    <div class="card">
      <div class="card-title">📋 Довідник</div>
      <div class="ref-cols">

        <!-- Гармати по батареях -->
        <div class="ref-block">
          <div class="ref-block-title">Гармати</div>
          <div id="cannons-ref"></div>
          <div class="ref-add" style="margin-top:10px;">
            <select id="new-cannon-bat" style="-webkit-appearance:none;width:90px;">
              <option value="7 абатр">7 абатр</option>
              <option value="8 абатр">8 абатр</option>
              <option value="9 абатр">9 абатр</option>
            </select>
            <input type="text" id="new-cannon" placeholder="№ гармати" onkeydown="if(event.key==='Enter')addCannon()">
            <button class="btn btn-primary" style="padding:6px 12px" onclick="addCannon()">+</button>
          </div>
        </div>

        <!-- Снаряди -->
        <div class="ref-block">
          <div class="ref-block-title">Снаряди</div>
          <div class="ref-list" id="shells-list"></div>
          <div class="ref-add">
            <input type="text" id="new-shell" placeholder="Назва снаряду" onkeydown="if(event.key==='Enter')addItem('shell')">
            <button class="btn btn-primary" style="padding:6px 12px" onclick="addItem('shell')">+</button>
          </div>
        </div>

        <!-- Заряди -->
        <div class="ref-block">
          <div class="ref-block-title">Заряди</div>
          <div class="ref-list" id="charges-list"></div>
          <div class="ref-add">
            <input type="text" id="new-charge" placeholder="Назва заряду" onkeydown="if(event.key==='Enter')addItem('charge')">
            <button class="btn btn-primary" style="padding:6px 12px" onclick="addItem('charge')">+</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ══ TAB: ЖУРНАЛ ══ -->
<div class="panel" id="tab-journal">
  <div class="fbar">
    <label>Батарея</label>
    <select id="jrn-battery" onchange="onBatteryChange('jrn');renderJournal()">
      <option value="">Всі</option>
      <option value="7 абатр">7 абатр</option>
      <option value="8 абатр">8 абатр</option>
      <option value="9 абатр">9 абатр</option>
    </select>
    <label>Гармата</label>
    <select id="jrn-cannon" onchange="renderJournal()">
      <option value="">Всі</option>
    </select>
    <input type="date" id="jrn-from" onchange="renderJournal()">
    <span style="color:var(--text2);font-size:12px">—</span>
    <input type="date" id="jrn-to" onchange="renderJournal()">
    <button class="btn btn-secondary" onclick="clearJrnFilter()">Скинути</button>
    <div style="flex:1"></div>
    <button class="btn btn-success" onclick="exportExcel()">⬇ Excel</button>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Батарея</th><th>Гармата</th><th>Дата</th>
          <th>Снаряд</th><th>Заряд</th><th>Зона</th>
          <th class="num">К-ть</th>
          <th>Об. кільце</th>
          <th class="num">Постріл заміни</th>
          <th class="num">Прив. настр.</th>
          <th class="num">Заг. прив. настр.</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="jrn-body"></tbody>
    </table>
  </div>
</div>

<!-- ══ TAB: ПІДСУМКИ ══ -->
<div class="panel" id="tab-summary">
  <div class="fbar">
    <label>Батарея</label>
    <select id="sum-battery" onchange="renderSummary()">
      <option value="">Всі</option>
      <option value="7 абатр">7 абатр</option>
      <option value="8 абатр">8 абатр</option>
      <option value="9 абатр">9 абатр</option>
    </select>
    <input type="date" id="sum-from" onchange="renderSummary()">
    <span style="color:var(--text2);font-size:12px">—</span>
    <input type="date" id="sum-to" onchange="renderSummary()">
    <button class="btn btn-secondary" onclick="clearSumFilter()">Скинути</button>
    <div style="flex:1"></div>
    <button class="btn btn-success" onclick="exportSummaryExcel()">⬇ Зведений Excel</button>
  </div>
  <div class="stats-grid" id="sum-totals"></div>
  <div id="sum-body"></div>
</div>

</div>

<!-- MODAL редагування -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏ Редагування запису</div>
    <div class="modal-grid">
      <div class="fg">
        <label>Батарея</label>
        <select id="ed-battery" onchange="onBatteryChange('ed')">
          <option value="7 абатр">7 абатр</option>
          <option value="8 абатр">8 абатр</option>
          <option value="9 абатр">9 абатр</option>
        </select>
      </div>
      <div class="fg">
        <label>Гармата</label>
        <select id="ed-cannon"></select>
      </div>
      <div class="fg full">
        <label>Дата</label>
        <input type="date" id="ed-date">
      </div>
      <div class="fg">
        <label>Снаряд</label>
        <select id="ed-shell"></select>
      </div>
      <div class="fg">
        <label>Заряд</label>
        <select id="ed-charge"></select>
      </div>
      <div class="fg">
        <label>Зона заряду</label>
        <select id="ed-zone">
          <option value="3">Зона 3</option><option value="4">Зона 4</option>
          <option value="5">Зона 5</option><option value="6">Зона 6</option>
          <option value="7">Зона 7</option><option value="8">Зона 8</option>
          <option value="9">Зона 9</option><option value="10">Зона 10</option>
        </select>
      </div>
      <div class="fg">
        <label>К-ть пострілів</label>
        <input type="number" id="ed-count" min="1">
      </div>
      <div class="fg full" style="flex-direction:row;align-items:center;gap:10px">
        <input type="checkbox" id="ed-ring" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;">
        <label for="ed-ring" style="font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;cursor:pointer">Обтюраційне кільце замінено</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-primary"   onclick="saveEdit()">Зберегти</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ZONE_K = {3:16,4:13,5:10,6:8,7:6,8:4,9:2,10:1};
const BATTERIES = ['7 абатр','8 абатр','9 абатр'];

// ── STORAGE — Firebase Realtime Database ──────────
let _cache = { ns_rec:[], ns_cannons2:[], ns_shells:[], ns_charges:[] };
let _loaded = false;

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

const getRec     = () => _cache.ns_rec;
const getCannons = () => _cache.ns_cannons2;
const getShells  = () => _cache.ns_shells;
const getCharges = () => _cache.ns_charges;

function saveRec(d)    { _cache.ns_rec=d;      db.ref('ns_rec').set(d); }
function saveCannons(d){ _cache.ns_cannons2=d; db.ref('ns_cannons2').set(d); }
function saveShells(d) { _cache.ns_shells=d;   db.ref('ns_shells').set(d); }
function saveCharges(d){ _cache.ns_charges=d;  db.ref('ns_charges').set(d); }

function initFirebase() {
  const keys = ['ns_rec','ns_cannons2','ns_shells','ns_charges'];
  let loadCount = 0;
  keys.forEach(k => {
    db.ref(k).on('value', snap => {
      const val = snap.val();
      _cache[k] = Array.isArray(val) ? val : (val ? Object.values(val) : []);
      loadCount++;
      if(loadCount >= keys.length && !_loaded) {
        _loaded = true;
        renderRef(); renderJournal(); renderSummary();
      } else if(_loaded) {
        renderRef(); renderJournal(); renderSummary(); quickStats();
      }
    });
  });
}

// ── INIT ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('inp-date').value = today;
  document.getElementById('hdate').textContent = fmtDate(today);
  document.getElementById('inp-cannon').addEventListener('change', quickStats);
  initFirebase();
});

// ── TABS ─────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='journal') renderJournal();
  if(name==='summary') renderSummary();
}

// ── BATTERY → CANNON cascade ─────────────────────
function onBatteryChange(prefix) {
  const bat = document.getElementById(prefix+'-battery').value;
  const sel = document.getElementById(prefix+'-cannon');
  const cur = sel ? sel.value : '';
  if(!sel) return;
  const cannons = getCannons().filter(c => !bat || c.bat === bat);
  sel.innerHTML = '<option value="">— оберіть —</option>';
  cannons.forEach(c => {
    const o = document.createElement('option');
    o.value = c.name; o.textContent = c.name; sel.appendChild(o);
  });
  if(cannons.find(c=>c.name===cur)) sel.value = cur;
  if(prefix==='inp') { quickStats(); }
}

// Journal battery filter cascade (allows "Всі")
function onBatteryChange(prefix) {
  const bat = document.getElementById(prefix+'-battery').value;
  const sel = document.getElementById(prefix+'-cannon');
  if(!sel) return;
  const cur = sel.value;
  const cannons = getCannons().filter(c => !bat || c.bat === bat);
  // first option differs by context
  const allLabel = (prefix==='inp') ? '— оберіть —' : 'Всі';
  sel.innerHTML = `<option value="">${allLabel}</option>`;
  cannons.forEach(c => {
    const o = document.createElement('option');
    o.value = c.name; o.textContent = `${c.name}`; sel.appendChild(o);
  });
  if(cannons.find(c=>c.name===cur)) sel.value = cur;
  if(prefix==='inp') quickStats();
}

// ── REFERENCE ─────────────────────────────────────
function renderRef() {
  // Cannons grouped by battery
  const cannons = getCannons();
  let html = '';
  BATTERIES.forEach(bat => {
    const bc = cannons.filter(c=>c.bat===bat);
    html += `<div class="bat-group">
      <div class="bat-group-label">${bat}</div>
      <div class="ref-list">
        ${bc.length
          ? bc.map(c=>`<div class="ref-tag"><span>${escH(c.name)}</span><button class="e" onclick="editCannon('${escAttr(c.bat)}','${escAttr(c.name)}')" title="Редагувати">✏</button><button class="x" onclick="removeCannon('${escAttr(c.bat)}','${escAttr(c.name)}')">✕</button></div>`).join('')
          : '<span class="ref-empty">порожньо</span>'}
      </div>
    </div>`;
  });
  document.getElementById('cannons-ref').innerHTML = html;

  // Shells & charges
  const shells  = getShells();
  const charges = getCharges();
  document.getElementById('shells-list').innerHTML  = refTags(shells,  'shell');
  document.getElementById('charges-list').innerHTML = refTags(charges, 'charge');

  // Populate shell/charge selects
  ['inp-shell','ed-shell'].forEach(id => fillSel(id, shells));
  ['inp-charge','ed-charge'].forEach(id => fillSel(id, charges));

  // Refresh cannon selects based on current battery selection
  ['inp','ed','jrn'].forEach(p => {
    const batEl = document.getElementById(p+'-battery');
    if(batEl) onBatteryChange(p);
  });
}

function refTags(items, type) {
  if(!items.length) return '<span class="ref-empty">порожньо</span>';
  return items.map(v=>`<div class="ref-tag"><span>${escH(v)}</span><button class="x" onclick="removeItem('${type}','${escAttr(v)}')">✕</button></div>`).join('');
}

function fillSel(id, items) {
  const sel = document.getElementById(id);
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">— оберіть —</option>';
  items.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  if(items.includes(cur)) sel.value = cur;
}

function addCannon() {
  const bat  = document.getElementById('new-cannon-bat').value;
  const name = document.getElementById('new-cannon').value.trim();
  if(!name){ toast('Введіть номер гармати!',true); return; }
  const cannons = getCannons();
  if(cannons.find(c=>c.bat===bat&&c.name===name)){ toast('Вже існує!',true); return; }
  cannons.push({bat, name});
  saveCannons(cannons);
  document.getElementById('new-cannon').value='';
  renderRef();
  toast(`Гармата "${name}" додана до ${bat}`);
}

function removeCannon(bat, name) {
  if(!confirm(`Видалити гармату "${name}" (${bat})?`)) return;
  saveCannons(getCannons().filter(c=>!(c.bat===bat&&c.name===name)));
  renderRef();
}

function addItem(type) {
  const inpId = type==='shell' ? 'new-shell' : 'new-charge';
  const name  = document.getElementById(inpId).value.trim();
  if(!name){ toast('Введіть значення!',true); return; }
  const get  = type==='shell' ? getShells  : getCharges;
  const save = type==='shell' ? saveShells : saveCharges;
  const items = get();
  if(items.map(s=>s.toLowerCase()).includes(name.toLowerCase())){ toast('Вже існує!',true); return; }
  items.push(name);
  save(items);
  document.getElementById(inpId).value='';
  renderRef();
  toast(`"${name}" додано`);
}

function removeItem(type, name) {
  if(!confirm(`Видалити "${name}"?`)) return;
  const get  = type==='shell' ? getShells  : getCharges;
  const save = type==='shell' ? saveShells : saveCharges;
  save(get().filter(s=>s!==name));
  renderRef();
}

function editItem(type, oldName) {
  const newName = prompt(`Нова назва (було: "${oldName}"):`, oldName);
  if(!newName||newName.trim()===''||newName.trim()===oldName) return;
  const trimmed = newName.trim();
  const get  = type==='shell' ? getShells  : getCharges;
  const save = type==='shell' ? saveShells : saveCharges;
  const items = get();
  if(items.map(s=>s.toLowerCase()).includes(trimmed.toLowerCase())&&trimmed.toLowerCase()!==oldName.toLowerCase()){toast('Така назва вже існує!',true);return;}
  save(items.map(s=>s===oldName?trimmed:s));
  const field=type==='shell'?'shell':'charge';
  saveRec(getRec().map(r=>r[field]===oldName?{...r,[field]:trimmed}:r));
  renderRef(); toast(`"${oldName}" → "${trimmed}"`);
}

function editCannon(oldBat, oldName) {
  const newName = prompt(`Новий номер гармати (було: "${oldName}"):`, oldName);
  if(!newName||newName.trim()===''||newName.trim()===oldName) return;
  const trimmed = newName.trim();
  const cannons = getCannons();
  if(cannons.find(c=>c.bat===oldBat&&c.name===trimmed)){toast('Така гармата вже існує!',true);return;}
  saveCannons(cannons.map(c=>c.bat===oldBat&&c.name===oldName?{...c,name:trimmed}:c));
  saveRec(getRec().map(r=>(r.cannon===oldName&&(r.battery||'')===oldBat)?{...r,cannon:trimmed}:r));
  renderRef(); toast(`Гармата "${oldName}" → "${trimmed}"`);
}

// ── ADD RECORD ────────────────────────────────────
function addRecord() {
  const battery = document.getElementById('inp-battery').value;
  const cannon  = document.getElementById('inp-cannon').value;
  const shell   = document.getElementById('inp-shell').value;
  const charge  = document.getElementById('inp-charge').value;
  const zone    = parseInt(document.getElementById('inp-zone').value);
  const count   = parseInt(document.getElementById('inp-count').value);
  const date    = document.getElementById('inp-date').value;
  const ring    = document.getElementById('inp-ring').checked;

  if(!battery||!cannon||!shell||!charge||!zone||!count||count<1||!date){
    toast('Заповніть всі поля!',true); return;
  }
  const reduced = +(count/ZONE_K[zone]).toFixed(6);
  const recs = getRec();
  recs.push({id:uid(), battery, cannon, date, shell, charge, zone, count, reduced, ring});
  saveRec(recs);
  document.getElementById('inp-shell').value='';
  document.getElementById('inp-charge').value='';
  document.getElementById('inp-zone').value='';
  document.getElementById('inp-count').value='';
  document.getElementById('inp-ring').checked=false;
  quickStats();
  renderJournal();
  toast('Запис додано ✓');
}

// ── QUICK STATS ───────────────────────────────────
function quickStats() {
  const cannon = document.getElementById('inp-cannon').value;
  const qs = document.getElementById('quick-stats');
  if(!cannon){ qs.style.display='none'; return; }
  const data = getRec().filter(r=>r.cannon===cannon);
  qs.style.display='block';
  const shots   = data.reduce((s,r)=>s+r.count,0);
  const reduced = data.reduce((s,r)=>s+r.reduced,0);
  const rings   = data.filter(r=>r.ring).length;
  document.getElementById('quick-cards').innerHTML=`
    <div class="stat-card"><div class="stat-label">Всього пострілів</div><div class="stat-value">${shots}</div></div>
    <div class="stat-card"><div class="stat-label">Приведений настріл</div><div class="stat-value">${reduced.toFixed(1)}</div></div>
    <div class="stat-card"><div class="stat-label">Замінено кілець</div><div class="stat-value" style="color:${rings>0?'var(--success)':'var(--accent)'}">${rings}</div></div>`;
}

// ── JOURNAL ───────────────────────────────────────
function renderJournal() {
  let data = getRec();
  const bat    = document.getElementById('jrn-battery').value;
  const cannon = document.getElementById('jrn-cannon').value;
  const from   = document.getElementById('jrn-from').value;
  const to     = document.getElementById('jrn-to').value;
  if(bat)    data=data.filter(r=>(r.battery||'')===bat);
  if(cannon) data=data.filter(r=>r.cannon===cannon);
  if(from)   data=data.filter(r=>r.date>=from);
  if(to)     data=data.filter(r=>r.date<=to);

  data.sort((a,b)=>(a.battery||'').localeCompare(b.battery||'')||(a.cannon||'').localeCompare(b.cannon||'')||(a.date||'').localeCompare(b.date||''));

  // Running total per cannon (приведений + реальні постріли від початку)
  const running={};
  const runShots={};  // наростаючі реальні постріли від початку обліку

  // Ініціалізуємо приведений і реальні постріли до початку фільтру
  if(from) {
    let preAll = getRec();
    console.log('preAll total before filter:', preAll.length, 'from=', from, 'bat=', bat, 'cannon=', cannon);
    if(bat)    preAll = preAll.filter(r=>(r.battery||'')===bat);
    if(cannon) preAll = preAll.filter(r=>r.cannon===cannon);
    preAll = preAll.filter(r=>r.date < from);
    console.log('preAll after filter (before from):', preAll.length, preAll.map(r=>r.date+' '+r.reduced));
    preAll.forEach(r=>{
      const key = String(r.cannon||'');
      if(running[key]  === undefined) running[key]=0;
      if(runShots[key] === undefined) runShots[key]=0;
      running[key]  += r.reduced;
      runShots[key] += r.count;
    });
    console.log('running after preAll:', JSON.stringify(running));
  }

  const rows=data.map(r=>{
    const key=String(r.cannon||'');
    if(running[key]  === undefined) running[key]=0;
    if(runShots[key] === undefined) runShots[key]=0;
    running[key]  += r.reduced;
    runShots[key] += r.count;
    return {...r, run:running[key], runShots:runShots[key]};
  });

  const tbody=document.getElementById('jrn-body');
  if(!rows.length){ tbody.innerHTML=`<tr><td colspan="13" class="empty">Записів немає</td></tr>`; return; }

  // Store rows globally for button access
  window._jrnRows = rows;
  tbody.innerHTML=rows.map((r,i)=>{
    return `<tr>
      <td style="color:var(--text2);font-size:11px">${i+1}</td>
      <td>${escH(r.battery)}</td>
      <td>${escH(r.cannon)}</td>
      <td>${fmtDate(r.date)}</td>
      <td>${escH(r.shell)}</td>
      <td>${escH(r.charge)}</td>
      <td>Зона ${r.zone}</td>
      <td class="num">${r.count}</td>
      <td style="text-align:center">${r.ring ? '<span style="color:var(--success)">✔</span>' : ''}</td>
      <td class="num" style="color:${r.ring?'var(--accent2)':'var(--text2)'}">${r.ring ? r.runShots : ''}</td>
      <td class="num hi">${r.reduced.toFixed(1)}</td>
      <td class="num">${r.run.toFixed(1)}</td>
      <td style="display:flex;gap:4px;padding-top:5px">
        <button class="btn-icon" onclick="jrnEdit(${i})">&#x270F;</button>
        <button class="btn-danger" onclick="jrnDel(${i})">&#x2715;</button>
      </td>
    </tr>`;
  }).join('');
}

function clearJrnFilter() {
  ['jrn-battery','jrn-cannon','jrn-from','jrn-to'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  onBatteryChange('jrn');
  renderJournal();
}



// ── EDIT MODAL ────────────────────────────────────
let _eId='';

function jrnEdit(i) {
  const r = window._jrnRows[i];
  openEdit({id:r.id,battery:r.battery,cannon:r.cannon,date:r.date,shell:r.shell,charge:r.charge,zone:r.zone,count:r.count});
}

function jrnDel(i) {
  if(!confirm('Ви впевнені, що хочете видалити цей запис?')) return;
  const id = window._jrnRows[i].id;
  saveRec(getRec().filter(r=>r.id!==id));
  renderJournal(); renderSummary(); quickStats();
  toast('Запис видалено');
}

function openEdit(row) {
  _eId = row.id;
  renderRef();
  document.getElementById('ed-battery').value = row.battery||'7 абатр';
  onBatteryChange('ed');
  setTimeout(()=>{ document.getElementById('ed-cannon').value = row.cannon; },0);
  document.getElementById('ed-date').value   = row.date||'';
  document.getElementById('ed-shell').value  = row.shell;
  document.getElementById('ed-charge').value = row.charge;
  document.getElementById('ed-zone').value   = String(row.zone);
  document.getElementById('ed-count').value  = row.count;
  document.getElementById('ed-ring').checked  = row.ring||false;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  _eId='';
}

function saveEdit() {
  const battery = document.getElementById('ed-battery').value;
  const cannon  = document.getElementById('ed-cannon').value;
  const date    = document.getElementById('ed-date').value;
  const shell   = document.getElementById('ed-shell').value;
  const charge  = document.getElementById('ed-charge').value;
  const zone    = parseInt(document.getElementById('ed-zone').value);
  const count   = parseInt(document.getElementById('ed-count').value);
  if(!battery||!cannon||!shell||!charge||!zone||!count||count<1||!date){
    toast('Заповніть всі поля!',true); return;
  }
  const reduced = +(count/ZONE_K[zone]).toFixed(6);
  const ring2 = document.getElementById('ed-ring').checked;
  let recs = getRec().filter(r=>r.id!==_eId);
  recs.push({id:uid(), battery, cannon, date, shell, charge, zone, count, reduced, ring:ring2});
  saveRec(recs);
  closeModal();
  renderJournal(); renderSummary(); quickStats();
  toast('Збережено ✓');
}

document.getElementById('editModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

// ── GROUPING ──────────────────────────────────────
function groupAll(data) {
  const map = new Map();
  data.forEach(r=>{
    const key=`${r.cannon}|${r.shell}|${r.charge}|${r.zone}`;
    if(!map.has(key)) map.set(key,{cannon:r.cannon,shell:r.shell,charge:r.charge,zone:r.zone,count:0,reduced:0});
    const g=map.get(key); g.count+=r.count; g.reduced+=r.reduced;
  });
  return [...map.values()];
}

// ── SUMMARY ───────────────────────────────────────
function renderSummary() {
  const allRec = getRec();
  const batFilter = document.getElementById('sum-battery').value;
  const from = document.getElementById('sum-from').value;
  const to   = document.getElementById('sum-to').value;

  // Period data for detail rows
  let periodData = allRec;
  if(batFilter) periodData=periodData.filter(r=>r.battery===batFilter);
  if(from) periodData=periodData.filter(r=>r.date>=from);
  if(to)   periodData=periodData.filter(r=>r.date<=to);

  // Cumulative data (from start up to 'to' date) for running total
  let cumulData = allRec;
  if(batFilter) cumulData=cumulData.filter(r=>r.battery===batFilter);
  if(to) cumulData=cumulData.filter(r=>r.date<=to);

  const totalShots   = periodData.reduce((s,r)=>s+r.count,0);
  const totalReduced = cumulData.reduce((s,r)=>s+r.reduced,0);
  const activeCannons= new Set(periodData.map(r=>r.cannon)).size;

  document.getElementById('sum-totals').innerHTML=`
    <div class="stat-card"><div class="stat-label">Пострілів за період</div><div class="stat-value">${totalShots}</div></div>
    <div class="stat-card"><div class="stat-label">Заг. приведений (з початку)</div><div class="stat-value">${totalReduced.toFixed(1)}</div></div>
    <div class="stat-card"><div class="stat-label">Активних гармат</div><div class="stat-value">${activeCannons}</div></div>
    <div class="stat-card"><div class="stat-label">Записів за період</div><div class="stat-value">${periodData.length}</div></div>`;

  // Group by battery sections
  const batsToShow = batFilter ? [batFilter] : BATTERIES;
  let html = '';

  batsToShow.forEach(bat => {
    const cannonsInBat = getCannons().filter(c=>c.bat===bat).map(c=>c.name);
    // also include any cannons in records not in reference
    const allInBat = [...new Set([...cannonsInBat, ...periodData.filter(r=>r.battery===bat).map(r=>r.cannon)])];
    const batPeriod = periodData.filter(r=>r.battery===bat);
    if(!batPeriod.length && !allInBat.length) return;

    let cardsHtml = '';
    allInBat.forEach(c=>{
      const cd = batPeriod.filter(r=>r.cannon===c);
      if(!cd.length) return;
      const allCd = allRec.filter(r=>r.cannon===c);          // всі записи цієї гармати
      const gr = groupAll(cd);
      const tot = allCd.reduce((s,r)=>s+r.count,0);          // пострілів за весь час
      const periodRed = cd.reduce((s,r)=>s+r.reduced,0);
      const cumulRed  = cumulData.filter(r=>r.cannon===c).reduce((s,r)=>s+r.reduced,0);
      const ringCount = allCd.filter(r=>r.ring).length;       // кілець за весь час

      cardsHtml += `
        <div class="sum-card">
          <div class="sum-card-h">
            <div class="sum-card-t">${escH(c)}</div>
            <div style="display:flex;gap:10px;align-items:center">
              <div style="font-size:11px;color:var(--text2)">${cd.length} зап.</div>
              ${ringCount>0?`<div style="font-size:11px;color:var(--success)">&#128204; ${ringCount} кільц.</div>`:''}
            </div>
          </div>
          <div class="sum-card-b" style="padding:0;overflow-x:auto;">
            <table class="sum-tbl">
              <thead><tr>
                <th>Снаряд</th><th>Заряд</th><th>Зона</th>
                <th class="r">К-ть</th><th class="r">Прив.</th><th class="r">Кільце</th>
              </tr></thead>
              <tbody>
                ${gr.sort((a,b)=>a.shell.localeCompare(b.shell)||a.charge.localeCompare(b.charge)||a.zone-b.zone).map(r=>`
                <tr>
                  <td>${escH(r.shell)}</td>
                  <td>${escH(r.charge)}</td>
                  <td style="white-space:nowrap">Зона ${r.zone}</td>
                  <td class="r">${r.count}</td>
                  <td class="r hi">${r.reduced.toFixed(1)}</td>
                  <td class="r">${r.ring?'<span class="ring-mark">✔</span>':''}</td>
                </tr>`).join('')}
              </tbody>
              <tfoot><tr style="background:rgba(201,168,76,.1);border-top:2px solid var(--accent)">
                <td colspan="3" style="font-family:var(--head);font-size:10px;letter-spacing:1px;color:var(--text2);padding:5px 6px">РАЗОМ / ЗАГ. ПРИВ.</td>
                <td class="r" style="font-weight:bold;color:var(--text);padding:5px 6px">${tot}</td>
                <td class="r" style="font-weight:bold;color:var(--accent2);font-size:13px;padding:5px 6px">${cumulRed.toFixed(1)}</td>
                <td class="r" style="color:${ringCount>0?'var(--success)':'var(--text2)'};font-weight:bold;padding:5px 6px">${ringCount||''}</td>
              </tr></tfoot>
            </table>
          </div>
        </div>`;
    });

    if(cardsHtml) {
      html += `<div class="bat-section">
        <div class="bat-header">⚡ ${bat}</div>
        <div class="sum-grid">${cardsHtml}</div>
      </div>`;
    }
  });

  document.getElementById('sum-body').innerHTML = html || `<div class="empty">Немає даних за обраний період</div>`;
}

function clearSumFilter(){
  document.getElementById('sum-battery').value='';
  document.getElementById('sum-from').value='';
  document.getElementById('sum-to').value='';
  renderSummary();
}

// ── EXPORT JOURNAL ────────────────────────────────
function exportExcel() {
  const allRec=getRec();
  let data=[...allRec];
  const bat    = document.getElementById('jrn-battery').value;
  const cannon = document.getElementById('jrn-cannon').value;
  const from   = document.getElementById('jrn-from').value;
  const to     = document.getElementById('jrn-to').value;
  if(bat)    data=data.filter(r=>(r.battery||'')===bat);
  if(cannon) data=data.filter(r=>r.cannon===cannon);
  if(from)   data=data.filter(r=>r.date>=from);
  if(to)     data=data.filter(r=>r.date<=to);
  data.sort((a,b)=>(a.battery||'').localeCompare(b.battery||'')||(a.cannon||'').localeCompare(b.cannon||'')||(a.date||'').localeCompare(b.date||''));

  const wb=XLSX.utils.book_new();
  const cannons=[...new Set(data.map(r=>String(r.cannon)))];

  cannons.forEach(c=>{
    const cd=data.filter(r=>String(r.cannon)===c);

    // Групування: снаряд+заряд+зона → сума к-ть, прив., кільця
    const groupMap=new Map();
    cd.forEach(r=>{
      const key=`${r.shell}||${r.charge}||${r.zone}`;
      if(!groupMap.has(key)) groupMap.set(key,{shell:r.shell,charge:r.charge,zone:r.zone,count:0,reduced:0,ring:false});
      const g=groupMap.get(key);
      g.count+=r.count;
      g.reduced+=r.reduced;
      if(r.ring) g.ring=true;
    });
    // Сортування по назві снаряду
    const grouped=[...groupMap.values()].sort((a,b)=>a.shell.localeCompare(b.shell)||a.charge.localeCompare(b.charge)||a.zone-b.zone);

    // Стартовий приведений = сума всіх записів до початку фільтру
    let run=0;
    if(from){
      let pre=allRec.filter(r=>String(r.cannon)===c);
      if(bat) pre=pre.filter(r=>(r.battery||'')===bat);
      pre=pre.filter(r=>r.date<from);
      run=pre.reduce((s,r)=>s+r.reduced,0);
    }

    // Підпис періоду
    const periodLabel = (from||to)
      ? ((from?fmtPeriod(from):'початок')+' — '+(to?fmtPeriod(to):'сьогодні'))
      : 'весь період';

    const rows=grouped.map((r,i)=>{
      run+=r.reduced;
      return [i+1,c,i===0?periodLabel:'',r.shell,r.charge,`Зона ${r.zone}`,r.count,r.ring?'Так':'',+r.reduced.toFixed(1),+run.toFixed(1)];
    });
    const ws=XLSX.utils.aoa_to_sheet([['№','Гармата','Період','Снаряд','Заряд','Зона','К-ть','Об. кільце','Прив. настр.','Заг. прив. настр.'],...rows]);
    ws['!cols']=[5,12,10,12,10,8,8,8,12,14].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,String(c).slice(0,31));
  });
  XLSX.writeFile(wb,`nastril_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel завантажено ✓');
}

// ── EXPORT SUMMARY ────────────────────────────────
function exportSummaryExcel() {
  const allRec=getRec();
  const from=document.getElementById('sum-from').value;
  const to  =document.getElementById('sum-to').value;
  let cumulData=allRec; if(to) cumulData=cumulData.filter(r=>r.date<=to);
  let periodData=allRec;
  if(from) periodData=periodData.filter(r=>r.date>=from);
  if(to)   periodData=periodData.filter(r=>r.date<=to);

  const wb=XLSX.utils.book_new();
  const sumRows=[['Батарея','Гармата','Пострілів за період','Прив. за період','Заг. прив. з початку']];

  BATTERIES.forEach(bat=>{
    const cannons=[...new Set([
      ...getCannons().filter(c=>c.bat===bat).map(c=>c.name),
      ...periodData.filter(r=>r.battery===bat).map(r=>r.cannon)
    ])];
    cannons.forEach(c=>{
      const cd=periodData.filter(r=>r.cannon===c);
      if(!cd.length) return;
      const shots=cd.reduce((s,r)=>s+r.count,0);
      const pRed =cd.reduce((s,r)=>s+r.reduced,0);
      const cRed =cumulData.filter(r=>r.cannon===c).reduce((s,r)=>s+r.reduced,0);
      sumRows.push([bat,c,shots,+pRed.toFixed(1),+cRed.toFixed(1)]);
    });
  });

  const ws0=XLSX.utils.aoa_to_sheet(sumRows);
  ws0['!cols']=[{wch:12},{wch:12},{wch:18},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws0,'Зведення');
  XLSX.writeFile(wb,`nastril_zvedeno_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Зведений Excel завантажено ✓');
}

// ── HELPERS ───────────────────────────────────────
function fmtDate(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return`${d}.${m}.${y}`; }
function fmtPeriod(iso){ if(!iso)return''; const[y,m]=iso.split('-'); return`${m}.${y}`; }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=err?'err show':'show';
  setTimeout(()=>t.className='',2600);
}
